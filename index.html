<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo } = React;
const D = window.DATA;

const NAV_ITEMS = [
  { label: 'Mercados',          target: 'sec-mercados' },
  { label: 'Gas Fundamentales', target: 'sec-gas' },
  { label: 'México SIN',        target: 'sec-mexico' },
  { label: 'LNG',               target: 'sec-lng' },
  { label: 'Triggers',          target: 'sec-triggers' },
];

function hashSeed(s){ let h=0; for(let i=0;i<s.length;i++){ h=((h<<5)-h)+s.charCodeAt(i); h|=0; } return Math.abs(h)||1; }
function rng(seed){ let s=seed; return ()=>{ s=(s*9301+49297)%233280; return s/233280; }; }

function genSeries(base, vol, trend, n=120, seed=1, crashAt=null, crashMag=0){
  const r = rng(seed);
  const out=[]; let v = base;
  for(let i=0;i<n;i++){
    v = v + (r()-0.5)*vol + trend;
    if (crashAt && i === crashAt) v = v * (1 - crashMag);
    if (crashAt && i === crashAt+1) v = v * (1 - crashMag*0.15);
    out.push(+v.toFixed(3));
  }
  out[n-1] = +(base).toFixed(3);
  return out;
}

function fmtNum(v, dec=2){
  if (v === null || v === undefined) return "N/D";
  const sign = v < 0 ? "-" : "";
  const abs = Math.abs(v);
  return sign + abs.toFixed(dec);
}

function ChangePill({ value }){
  if (value === 0 || value === null || value === undefined) return <span className="mono" style={{color:"var(--text-3)"}}>—</span>;
  const up = value >= 0;
  return (
    <span className="mono" style={{color: up?"var(--up)":"var(--down)", fontWeight:600}}>
      {up?"▲":"▼"} {Math.abs(value).toFixed(2)}%
    </span>
  );
}

function ResponsiveSparkline({ data, height=40, color, fill=true }){
  const wrap = useRef(null);
  const [w, setW] = useState(120);
  useEffect(()=>{
    if(!wrap.current) return;
    const ro = new ResizeObserver(entries=>{
      for(const e of entries){ setW(Math.max(60, e.contentRect.width)); }
    });
    ro.observe(wrap.current);
    return ()=>ro.disconnect();
  },[]);
  const min = Math.min(...data), max = Math.max(...data);
  const range = max-min || 1;
  const step = w/(data.length-1);
  const pts = data.map((v,i)=>[i*step, height - ((v-min)/range)*(height-4) - 2]);
  const path = pts.map((p,i)=>(i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const area = path + " L"+w+","+height+" L0,"+height+" Z";
  const col = color || "var(--accent)";
  return (
    <div ref={wrap} style={{width:"100%",height}}>
      <svg width={w} height={height} viewBox={`0 0 ${w} ${height}`} style={{display:"block"}}>
        {fill && <path d={area} fill={col} opacity="0.12"/>}
        <path d={path} stroke={col} strokeWidth="1.5" fill="none"/>
      </svg>
    </div>
  );
}

function LineChart({ series, labels, height=280, period="1A" }){
  const slice = { "1D":2, "1S":7, "1M":30, "3M":90, "YTD":108, "1A":120 }[period] || series[0].data.length;
  series = series.map(s => ({
    ...s,
    data: s.data.slice(-slice),
    raw: s.raw ? s.raw.slice(-slice) : null,
    rawOriginal: s.rawOriginal ? s.rawOriginal.slice(-slice) : null,
    dates: s.dates ? s.dates.slice(-slice) : null,
    axis: s.axis || "left",
  }));
  const wrap = useRef(null);
  const svgRef = useRef(null);
  const [w, setW] = useState(600);
  const [hoverIdx, setHoverIdx] = useState(null);
  useEffect(()=>{
    if(!wrap.current) return;
    const ro = new ResizeObserver(entries=>{
      for(const e of entries){ setW(Math.max(300, e.contentRect.width)); }
    });
    ro.observe(wrap.current);
    return ()=>ro.disconnect();
  },[]);
  const n = series[0].data.length;
  const padL=50, padR=50, padT=10, padB=24;
  const cw = w - padL - padR, ch = height - padT - padB;
  const leftSeries = series.filter(s=>s.axis==="left");
  const rightSeries = series.filter(s=>s.axis==="right");
  const axisRange = (arr)=>{
    if(arr.length===0) return {min:0,max:1,range:1};
    const vals = arr.flatMap(s=>s.data);
    let mn = Math.min(...vals), mx = Math.max(...vals);
    const pad = (mx-mn)*0.08 || Math.abs(mx)*0.05 || 1;
    mn -= pad; mx += pad;
    return { min: mn, max: mx, range: (mx-mn)||1 };
  };
  const L = axisRange(leftSeries);
  const R = axisRange(rightSeries);
  const yFor = (v, axis) => {
    const A = axis==="right" ? R : L;
    return padT + (1-(v-A.min)/A.range)*ch;
  };
  const step = cw/(n-1);
  const ticks = [0,0.25,0.5,0.75,1];
  const leftUnit = leftSeries[0]?.unit || "";
  const rightUnit = rightSeries[0]?.unit || "";
  const onMove = (e)=>{
    if(!svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const scaleX = w / rect.width;
    const x = (e.clientX - rect.left) * scaleX;
    const rel = x - padL;
    if(rel < -step/2 || rel > cw + step/2){ setHoverIdx(null); return; }
    let idx = Math.round(rel/step);
    if(idx < 0) idx = 0;
    if(idx > n-1) idx = n-1;
    setHoverIdx(idx);
  };
  const onLeave = ()=> setHoverIdx(null);
  const hoverX = hoverIdx != null ? padL + hoverIdx*step : null;
  const tooltipW = 230;
  const tooltipH = 22 + series.length*16 + (series.some(s=>s.rawOriginal) ? 14 : 0);
  let tipX = hoverX != null ? hoverX + 12 : 0;
  if(hoverX != null && tipX + tooltipW > w - padR) tipX = hoverX - tooltipW - 12;
  const tipY = padT + 4;
  const fmtUnit = (unit)=> unit.replace(/^\$\//, "/").replace(/^EUR\//, "/");
  return (
    <div ref={wrap} style={{width:"100%"}}>
      <svg ref={svgRef} width={w} height={height} viewBox={`0 0 ${w} ${height}`} style={{display:"block"}}
        onMouseMove={onMove} onMouseLeave={onLeave}>
        {ticks.map((t,i)=>{
          const y = padT + (1-t)*ch;
          const leftVal = L.min + t*L.range;
          const rightVal = R.min + t*R.range;
          return (
            <g key={i}>
              <line x1={padL} x2={w-padR} y1={y} y2={y} stroke="var(--border)" strokeDasharray="2,4"/>
              {leftSeries.length>0 && (
                <text x={padL-6} y={y+3} fill="var(--text-3)" fontSize="10" textAnchor="end" fontFamily="var(--font-mono)">
                  {leftVal.toFixed(leftVal<10?1:0)}
                </text>
              )}
              {rightSeries.length>0 && (
                <text x={w-padR+6} y={y+3} fill="var(--text-3)" fontSize="10" textAnchor="start" fontFamily="var(--font-mono)">
                  {rightVal.toFixed(rightVal<10?2:1)}
                </text>
              )}
            </g>
          );
        })}
        {leftSeries.length>0 && (
          <text x={padL-6} y={padT-2} fill="var(--text-2)" fontSize="9" textAnchor="end" fontFamily="var(--font-mono)" fontWeight="600">
            {fmtUnit(leftUnit)}
          </text>
        )}
        {rightSeries.length>0 && (
          <text x={w-padR+6} y={padT-2} fill="var(--text-2)" fontSize="9" textAnchor="start" fontFamily="var(--font-mono)" fontWeight="600">
            {fmtUnit(rightUnit)}
          </text>
        )}
        {series.map((s, si)=>{
          const pts = s.data.map((v,i)=>[padL + i*step, yFor(v, s.axis)]);
          const path = pts.map((p,i)=>(i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
          const dash = s.axis==="right" ? "0" : "0";
          return <path key={si} d={path} stroke={s.color} strokeWidth="2" fill="none" opacity="0.9" strokeDasharray={dash}/>;
        })}
        <rect x={padL} y={padT} width={cw} height={ch} fill="transparent"/>
        {hoverIdx != null && (
          <g>
            <line x1={hoverX} x2={hoverX} y1={padT} y2={padT+ch} stroke="var(--text-3)" strokeDasharray="3,3" opacity="0.6"/>
            {series.map((s, si)=>{
              const v = s.data[hoverIdx];
              const y = yFor(v, s.axis);
              return <circle key={si} cx={hoverX} cy={y} r="3.5" fill={s.color} stroke="var(--panel)" strokeWidth="1.5"/>;
            })}
            <g transform={`translate(${tipX}, ${tipY})`}>
              <rect width={tooltipW} height={tooltipH} rx="4" fill="var(--panel)" stroke="var(--border)" opacity="0.97"/>
              <text x="8" y="14" fill="var(--text-3)" fontSize="10" fontFamily="var(--font-mono)">
                {(() => {
                  const anyDates = series.find(s => s.dates);
                  if (anyDates && anyDates.dates[hoverIdx]) return anyDates.dates[hoverIdx];
                  if (labels && labels[hoverIdx]) return labels[hoverIdx];
                  return `t-${n-1-hoverIdx}`;
                })()}
              </text>
              {series.map((s, si)=>{
                const price = s.raw ? s.raw[hoverIdx] : s.data[hoverIdx];
                const unitStr = s.unit || "";
                const prefix = unitStr.startsWith("EUR") ? "€" : "$";
                const display = `${prefix}${price.toFixed(2)}${fmtUnit(unitStr)}`;
                const axisMark = s.axis === "right" ? "R" : "L";
                return (
                  <g key={si} transform={`translate(8, ${22 + si*16})`}>
                    <rect x="0" y="4" width="8" height="2" fill={s.color}/>
                    <text x="14" y="9" fill="var(--text-2)" fontSize="11" fontFamily="var(--font-mono)">
                      {s.name} <tspan fill="var(--text-3)" fontSize="9">[{axisMark}]</tspan>
                    </text>
                    <text x={tooltipW-6} y="9" textAnchor="end" fill="var(--text)" fontSize="11" fontFamily="var(--font-mono)" fontWeight="600">
                      {display}
                    </text>
                  </g>
                );
              })}
              {series.some(s=>s.rawOriginal) && (
                <text x="8" y={22 + series.length*16 + 10} fill="var(--text-3)" fontSize="9" fontFamily="var(--font-mono)">
                  {(() => {
                    const s = series.find(x=>x.rawOriginal);
                    return `TTF orig: €${s.rawOriginal[hoverIdx].toFixed(2)}/MWh (EUR/USD=1.09)`;
                  })()}
                </text>
              )}
            </g>
          </g>
        )}
      </svg>
      <div style={{display:"flex",gap:14,marginTop:6,flexWrap:"wrap"}}>
        {series.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{width:10,height:2,background:s.color,display:"inline-block"}}></span>
            <span className="label">{s.name} <span style={{opacity:0.5,fontSize:9}}>[{s.axis==="right"?"der":"izq"}]</span></span>
          </div>
        ))}
      </div>
    </div>
  );
}

function Donut({ segments, size=140 }){
  const total = segments.reduce((a,b)=>a+b.value,0);
  const r = size/2 - 8;
  const cx = size/2, cy = size/2;
  let acc = 0;
  const arcs = segments.map((s)=>{
    const frac = s.value/total;
    const startA = acc*2*Math.PI - Math.PI/2;
    const endA = (acc+frac)*2*Math.PI - Math.PI/2;
    acc += frac;
    const x1 = cx + r*Math.cos(startA), y1 = cy + r*Math.sin(startA);
    const x2 = cx + r*Math.cos(endA), y2 = cy + r*Math.sin(endA);
    const large = frac > 0.5 ? 1 : 0;
    return { d: `M ${cx} ${cy} L ${x1.toFixed(1)} ${y1.toFixed(1)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(1)} ${y2.toFixed(1)} Z`, color: s.color, label: s.label, value: s.value };
  });
  return (
    <div style={{display:"flex",gap:20,alignItems:"center"}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {arcs.map((a,i)=><path key={i} d={a.d} fill={a.color} opacity="0.9"/>)}
        <circle cx={cx} cy={cy} r={r*0.55} fill="var(--panel)"/>
        <text x={cx} y={cy+4} textAnchor="middle" fill="var(--text)" fontSize="14" fontFamily="var(--font-mono)" fontWeight="600">MIX</text>
      </svg>

function KPICard({ hub, period="1A" }){
  const n = 80;
  const crashAt = Math.abs(hub.chg) > 5 ? n-2 : null;
  const crashMag = crashAt ? Math.abs(hub.chg)/100 : 0;
  const full = useMemo(()=>genSeries(
    Math.abs(hub.value) || 1,
    Math.abs(hub.value)*0.04,
    0,
    n,
    hashSeed(hub.key+D.EVENT.date),
    crashAt,
    crashMag
  ),[hub.key]);
  const slice = { "1D":2, "1S":7, "1M":20, "3M":50, "YTD":72, "1A":80 }[period] || n;
  const data = full.slice(-slice);
  return (
    <div className="panel" style={{padding:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
        <div>
          <div className="label">{hub.label}</div>
          <div style={{color:"var(--text-3)",fontSize:10,fontFamily:"var(--font-mono)"}}>{hub.unit}</div>
        </div>
        <ChangePill value={hub.chg}/>
      </div>
      <div className="mono" style={{fontSize:24,fontWeight:700,marginBottom:4}}>
        {hub.value < 0 ? "−" : ""}{Math.abs(hub.value).toFixed(hub.key==="MXN"?4:2)}
      </div>
      {hub.alt && <div className="mono" style={{fontSize:11,color:"var(--text-3)",marginBottom:8}}>{hub.alt}</div>}
      <ResponsiveSparkline data={data} height={36} color={hub.chg>=0?"var(--up)":"var(--down)"}/>
    </div>
  );
}

  return (
    <section id={id} style={{padding:"20px 24px", scrollMarginTop:70, ...style}}>
      <div style={{display:"flex",alignItems:"baseline",gap:12,marginBottom:16,paddingBottom:8,borderBottom:"1px solid var(--border)"}}>
        <h2 style={{fontFamily:"var(--font-display)",fontSize:15,fontWeight:600,margin:0,letterSpacing:"-0.01em"}}>{title}</h2>
      </div>
      {children}
    </section>
  );
}

function App(){
  const [period, setPeriod] = useState("1D");
  const [activeNav, setActiveNav] = useState("sec-mercados");
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [theme, setTheme] = useState(()=>{
    try { return localStorage.getItem("em-theme") || TWEAK_DEFAULTS.theme || "midnight"; }
    catch(e){ return TWEAK_DEFAULTS.theme || "midnight"; }
  });

  function handleThemeChange(k){
    setTheme(k);
    window.applyTheme(k);
  }

  function handleNav(target){
    setActiveNav(target);
    const el = document.getElementById(target);
    if (el) el.scrollIntoView({ behavior:"smooth", block:"start" });
  }

  useEffect(()=>{
    const ids = NAV_ITEMS.map(n=>n.target);
    function onScroll(){
      for (let i = ids.length-1; i >= 0; i--){
        const el = document.getElementById(ids[i]);
        if (el && el.getBoundingClientRect().top <= 120){ setActiveNav(ids[i]); return; }
      }
      setActiveNav(ids[0]);
    }
    window.addEventListener("scroll", onScroll, { passive:true });
    return ()=>window.removeEventListener("scroll", onScroll);
  },[]);

  const lineSeries = useMemo(()=>{
    const names = ["WTI","Brent","HH","TTF","JKM"];
    const colors = ["var(--down)","var(--accent)","var(--up)","#4a9eff","#b879ff"];
    const OIL = new Set(["WTI","Brent"]);
    const EUR_USD = 1.09;
    const TTF_FACTOR = EUR_USD / 3.412;
    const HIST = window.HIST_SERIES && window.HIST_SERIES.series;
    return names.map((n,i)=>{
      const h = D.HUBS.find(x=>x.key===n);
      const hist = HIST && HIST[n];
      const axis = OIL.has(n) ? "left" : "right";
      if (hist && hist.data && hist.data.length > 0) {
        let raw = hist.data.map(p => p[1]);
        const dates = hist.data.map(p => p[0]);
        let unit = hist.unit;
        let rawOriginal = null;
        let sourceUnit = null;
        if (n === "TTF" && hist.unit === "EUR/MWh") {
          rawOriginal = raw.slice();
          sourceUnit = "EUR/MWh";
          raw = raw.map(v => v * TTF_FACTOR);
          unit = "$/MMBtu";
        }
        return {
          name: n, color: colors[i], axis,
          data: raw, raw, rawOriginal, dates,
          unit, sourceUnit, source: hist.source,
          last: raw[raw.length-1]
        };
      }
      const crashAt = h && Math.abs(h.chg) > 5 ? 118 : null;
      const crashMag = crashAt ? Math.abs(h.chg)/100 : 0;
      const synth = genSeries(h ? h.value : 100, (h ? h.value : 100)*0.03, 0, 120, hashSeed(n+D.EVENT.date), crashAt, crashMag);
      return { name: n, color: colors[i], axis, data: synth, raw: synth, last: h ? h.value : null, unit: h ? h.unit : "" };
    });
  },[]);

  return (
    <div>
      <Header period={period} onPeriodChange={setPeriod} activeNav={activeNav} onNav={handleNav}/>
      <div style={{maxWidth:1440,margin:"0 auto"}}>
        <div style={{padding:"16px 24px 0"}}>
          <EventBanner event={D.EVENT}/>
        </div>
        <TickerBar hubs={D.HUBS}/>

        <Section id="sec-mercados" title="Mercados · KPIs Canónicos">
          <div className="grid" style={{gridTemplateColumns:"repeat(6, minmax(0, 1fr))"}}>
            {["WTI","Brent","HH","TTF","MXN","JKM"].map(k=>{
              const h = D.HUBS.find(x=>x.key===k);
              return <KPICard key={k} hub={h} period={period}/>;
            })}
          </div>
          <div style={{marginTop:16}} className="grid" style={{gridTemplateColumns:"repeat(2, minmax(0, 1fr))",gap:16}}>
            {["Waha","EUR"].map(k=>{
              const h = D.HUBS.find(x=>x.key===k);
              return <KPICard key={k} hub={h} period={period}/>;
            })}
          </div>
        </Section>

        <Section id="sec-gas" title="Gas Fundamentales · Storage & Series">
          <div className="grid" style={{gridTemplateColumns:"2fr 1fr"}}>
            <div className="panel">
              <div className="label" style={{marginBottom:10}}>PETRÓLEO (IZQ · $/BBL) · GAS (DER · $/MMBTU) — DOBLE EJE · 120 DÍAS</div>
              <LineChart series={lineSeries} height={260} period={period}/>
              <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--border)",fontSize:10,color:"var(--text-3)",fontFamily:"var(--font-mono)",lineHeight:1.5}}>
                <div><span style={{color:"var(--up)"}}>●</span> WTI · Brent · HH: <b>EIA API</b> (spot diario, autoritativo)</div>
                <div><span style={{color:"#b879ff"}}>●</span> TTF · JKM: <b>Yahoo Finance</b> (TTF=F / JKM=F, futuros ICE — fuente libre, menos precisa que ICE/Platts)</div>
                <div style={{marginTop:3,opacity:0.7}}>TTF convertido a $/MMBtu con EUR/USD=1.09 (fórmula: EUR/MWh × 1.09 / 3.412). Última actualización: {window.HIST_SERIES ? window.HIST_SERIES.generated : "N/A"}</div>
              </div>
            </div>
            <StorageGauge data={D.STORAGE}/>
          </div>
          <div style={{marginTop:16}}>
            <Scorecard rows={D.SCORECARD_ROWS}/>
          </div>
        </Section>

        <Section id="sec-lng" title="LNG · Netbacks por Ruta">
          <div className="grid" style={{gridTemplateColumns:"repeat(3, minmax(0, 1fr))"}}>
            {D.NETBACKS.map((nb,i)=><NetbackCard key={i} nb={nb}/>)}
          </div>
        </Section>

        <Section id="sec-triggers" title="Triggers · Geo Risks · Balance">
          <div className="grid" style={{gridTemplateColumns:"1fr 1fr 1.2fr"}}>
            <TriggersList triggers={D.TRIGGERS}/>
            <GeoRisks rows={D.GEO_RISKS}/>
            <BalanceOD items={D.SUPPLY_DEMAND} net={D.BALANCE_NET}/>
          </div>
        </Section>

        <Section id="sec-mexico" title="México · SIN · Gas · Arbitraje">
          <MxStats k={D.MEXICO_KPIS}/>
          <div style={{marginTop:16}} className="grid" style={{gridTemplateColumns:"1.2fr 1fr 1fr",gap:16}}>
            <SINRegional regions={D.SIN_REGIONS}/>
            <IPGNTable rows={D.IPGN_REGIONS}/>
            <MixDonut segments={D.SIN_MIX}/>
          </div>
        </Section>

        <Section id="sec-headlines" title="Scorecard & Headlines">
          <div className="grid" style={{gridTemplateColumns:"1.4fr 1fr"}}>
            <div className="panel">
              <div className="label" style={{marginBottom:12}}>RESUMEN EJECUTIVO</div>
              <ul style={{margin:0,paddingLeft:18,fontSize:13,color:"var(--text-2)",lineHeight:1.6}}>
                <li><b>WTI $89.61 (+6.87%)</b> y <b>Brent $95.48 (+5.64%)</b> rebotan tras re-escalada Ormuz fin de semana (confiscación buque iraní + ataque IRGC).</li>
                <li><b>JKM $15.00 (−4.9%) NO recupera prima</b> pese a Ormuz re-cerrado — cambio de régimen Pacífico estructural confirmado.</li>
                <li><b>HH $2.71</b> desacoplado del rebote · storage 1,970 Bcf (+102 vs. 5yr, +126 YoY) · brecha YoY se amplía (bajista).</li>
                <li><b>TTF $12.96</b> cruza bajo threshold $13 — arbitraje atlántico comprimido (−10.5% vs. 18-abr).</li>
                <li>Tregua 7-abr expira esta semana · calendario crítico · riesgo retaliación iraní directa elevado.</li>
                <li>Arbitraje ECA→Asia ~$112M/mes · subsidio Waha intacto ~$540M/mes · YTD ~$12.5B.</li>
              </ul>
            </div>
            <Headlines items={D.HEADLINES}/>
          </div>
        </Section>

        <Section id="sec-projects" title="Infraestructura Estratégica">
          <ProjectsTable rows={D.PROJECTS}/>
        </Section>

        <footer style={{padding:"20px 24px",marginTop:20,borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text-3)"}}>
          <div>
            <div className="label" style={{marginBottom:4}}>FUENTES</div>
            <div>{D.FUENTES.join(" · ")}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div className="label">PRÓXIMA PUB EIA</div>
            <div className="mono" style={{fontWeight:600}}>{D.STORAGE.nextPub}</div>
          </div>
        </footer>
      </div>

      <button onClick={()=>setTweaksOpen(o=>!o)}
        style={{
          position:"fixed",bottom:20,right:20,zIndex:99,
          width:40,height:40,borderRadius:"50%",
          background:"var(--accent)",color:"var(--bg)",border:"none",
          cursor:"pointer",fontSize:16,fontWeight:700,
          boxShadow:"0 4px 14px rgba(0,0,0,0.25)"
        }}>⚙</button>
      <TweaksPanel open={tweaksOpen} onClose={()=>setTweaksOpen(false)} theme={theme} onThemeChange={handleThemeChange}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

window.addEventListener("message", function(ev){
  if (ev.data && ev.data.type === "__activate_edit_mode"){
    document.documentElement.setAttribute("data-edit-mode","1");
  }
});
try { parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch(e){}
</script>
</body>
</html>
